server {
    listen 80;
    server_name library.mahanaim.ac.ke www.library.mahanaim.ac.ke;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name library.mahanaim.ac.ke www.library.mahanaim.ac.ke;
    
    ssl_certificate /etc/letsencrypt/live/library.mahanaim.ac.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/library.mahanaim.ac.ke/privkey.pem;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
        proxy_pass http://172.17.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name librarian.mahanaim.ac.ke www.librarian.mahanaim.ac.ke;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name librarian.mahanaim.ac.ke www.librarian.mahanaim.ac.ke;
    
    ssl_certificate /etc/letsencrypt/live/librarian.mahanaim.ac.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/librarian.mahanaim.ac.ke/privkey.pem;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
        proxy_pass http://172.17.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
